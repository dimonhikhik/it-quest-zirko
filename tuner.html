<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>TUNER | ДЕКОДУВАННЯ</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root { --green: #00ff41; --bg: #050505; }
  body { 
    background: var(--bg); color: var(--green); 
    font-family: 'Share Tech Mono', monospace;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; margin: 0;
  }

  .device {
    border: 3px solid var(--green); padding: 40px; background: #001100;
    box-shadow: 0 0 30px rgba(0, 255, 65, 0.2); width: 450px; 
    text-align: center; position: relative;
  }

  /* Екран, де текст лежить під шумом */
  .screen-container {
    position: relative;
    background: #000; 
    border: 2px solid var(--green);
    margin-bottom: 20px;
    height: 160px;
    overflow: hidden;
  }

  /* Текст заздалегідь написаний ВНИЗУ */
  .screen-text {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1; padding: 15px; box-sizing: border-box;
    font-size: 16px; line-height: 1.4; color: #fff; text-align: left;
  }

  /* Шум лежить ЗВЕРХУ тексту */
  #noise-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 2; opacity: 1; /* Повний шум спочатку */
    pointer-events: none;
  }

  .slider-group { margin: 20px 0; text-align: left; }
  .slider-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
  
  input[type=range] {
    width: 100%; cursor: pointer; accent-color: var(--green);
  }

  #final-btn { 
    display: none; margin-top: 15px;
  }

  button {
    background: var(--green); color: #000; border: none;
    padding: 12px; font-family: inherit; font-weight: bold;
    cursor: pointer; width: 100%; box-shadow: 0 0 10px var(--green);
  }
</style>
</head>
<body>

<div class="device">
  <h2 style="margin-top:0; letter-spacing: 2px; color: var(--green);">Декодер версія #04</h2>
  
  <div class="screen-container">
    <!-- Текст, який діти намагаються побачити -->
    <div class="screen-text">
      <b style="color: var(--green);">[ПОВІДОМЛЕННЯ ВІДНОВЛЕНО]</b><br><br>
      https://bit.ly/42dBzVq
    </div>
    <!-- Шар шуму, що перекриває текст -->
    <canvas id="noise-canvas"></canvas>
  </div>

  <p style="font-size: 13px; color: #888; margin-top: 0;">Підказка: Павук (?), Кольори веселки (?), Школа (?)</p>

  <div class="slider-group">
    <div class="slider-label">ЧАСТОТА: <span id="v1">0</span></div>
    <input type="range" id="s1" min="0" max="15" value="0">
  </div>

  <div class="slider-group">
    <div class="slider-label">АМПЛІТУДА: <span id="v2">0</span></div>
    <input type="range" id="s2" min="0" max="15" value="0">
  </div>

  <div class="slider-group">
    <div class="slider-label">ФАЗА: <span id="v3">0</span></div>
    <input type="range" id="s3" min="0" max="56" value="0">
  </div>

</div>

<script>
const canvas = document.getElementById('noise-canvas');
const ctx = canvas.getContext('2d');
const sliders = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
const vals = [document.getElementById('v1'), document.getElementById('v2'), document.getElementById('v3')];
const target = [8, 7, 42];

// Малюємо шум
function drawNoise() {
  const w = canvas.width = 450; 
  const h = canvas.height = 160;
  const idata = ctx.createImageData(w, h);
  const buffer32 = new Uint32Array(idata.data.buffer);
  for (let i = 0; i < buffer32.length; i++) {
    buffer32[i] = Math.random() < 0.5 ? 0xffffffff : 0xff000000;
  }
  ctx.putImageData(idata, 0, 0);
}

function animate() {
  drawNoise();
  requestAnimationFrame(animate);
}
animate();

function checkSignal() {
  let totalDiff = 0;
  sliders.forEach((s, i) => {
    vals[i].textContent = s.value;
    totalDiff += Math.abs(parseInt(s.value) - target[i]);
  });

  // Логіка прозорості: чим ближче до 0, тим прозоріший шум
  // totalDiff може бути до 42. Робимо поріг прозорості.
  let opacity = Math.min(1, totalDiff / 12); 
  canvas.style.opacity = opacity;

  if (totalDiff === 0) {
    canvas.style.display = "none";
    document.getElementById('final-btn').style.display = "block";
  } else {
    canvas.style.display = "block";
    document.getElementById('final-btn').style.display = "none";
  }
}

sliders.forEach(s => s.addEventListener('input', checkSignal));
</script>
</body>
</html>
